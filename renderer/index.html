<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com;">
  <title>esign</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header Bar -->
  <header id="header">
    <div class="header-brand">esign</div>
    <button id="header-open-btn" class="header-btn">Open PDF</button>
  </header>

  <!-- Drop Zone (visible when no PDF is loaded) -->
  <div id="drop-zone">
    <div class="drop-zone-content">
      <div class="drop-zone-icon">&#128196;</div>
      <p class="drop-zone-text">Drag &amp; drop a PDF here</p>
      <p class="drop-zone-subtext">or</p>
      <button id="drop-zone-open-btn" class="btn-primary">Choose File</button>
    </div>
  </div>

  <!-- Main Workspace (hidden until PDF is loaded) -->
  <div id="workspace" class="hidden">
    <!-- Left Sidebar -->
    <aside id="sidebar">
      <div id="signature-panel-container" class="panel-section">
        <h3 class="panel-title">Signature</h3>
      </div>
      <div id="text-panel-container" class="panel-section">
        <h3 class="panel-title">Text Field</h3>
      </div>
    </aside>

    <!-- PDF Viewer Area -->
    <main id="viewer-area">
      <div id="pdf-container"></div>
    </main>
  </div>

  <!-- Bottom Action Bar -->
  <div id="action-bar" class="hidden">
    <button id="sign-save-btn" class="btn-primary" disabled>Sign &amp; Save</button>
  </div>

  <!-- Loading Overlay -->
  <div id="loading-overlay" class="hidden">
    <div class="spinner"></div>
    <p class="loading-text">Processing...</p>
  </div>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <!-- pdf.js setup: import as ES module and expose globally -->
  <script type="module" src="js/pdfjs-init.mjs"></script>

  <!-- Renderer modules (vanilla JS, attach to window) -->
  <script src="js/pdf-viewer.js"></script>
  <script src="js/placement.js"></script>
  <script src="js/signature-panel.js"></script>
  <script src="js/text-panel.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
